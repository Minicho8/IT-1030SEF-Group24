<html>
<head>
    <meta charset="UTF-8">
    <title>Accessible Toolbar</title>
    <style>
        .toolbar {
            position: relative;
            display: inline-block;
        }
        .menu {
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            border: 1px solid #ccc;
            padding: 0.5em;
            display: none;
        }
        .menu[hidden] {
            display: none;
        }
    </style>]
    
</head>
<body>
    <script src="test1.js"></script>
</body>
</html>
