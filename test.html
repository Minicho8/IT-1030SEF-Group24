<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Filter Box Demo</title>
	<style>
		:root {
			--menu-bg: #ffffff;
			--menu-border: #d7d7d7;
			--menu-shadow: 0 10px 24px rgba(0, 0, 0, 0.15);
			--menu-hover: #f1f3f4;
			--text: #202124;
		}

		body {
			margin: 0;
			font-family: "Segoe UI", Tahoma, Arial, sans-serif;
			color: var(--text);
			background: #f8f9fa;
		}

		main {
			padding: 40px;
		}

		.filter-toolbar {
			position: relative;
			display: inline-block;
		}

		.filter-button {
			border: 1px solid var(--menu-border);
			background: var(--menu-bg);
			border-radius: 6px;
			padding: 8px 14px;
			font-size: 14px;
			cursor: pointer;
		}

		.filter-menu,
		.filter-submenu {
			position: absolute;
			background: var(--menu-bg);
			border: 1px solid var(--menu-border);
			border-radius: 8px;
			box-shadow: var(--menu-shadow);
			padding: 6px;
			min-width: 200px;
			z-index: 10;
		}

		.filter-menu {
			top: calc(100% + 8px);
			left: 0;
		}

		.filter-submenu {
			top: 0;
			left: calc(100% + 8px);
			min-width: 180px;
			z-index: 20;
		}

		.filter-menu[hidden],
		.filter-submenu[hidden] {
			display: none;
		}

		.menu-item {
			width: 100%;
			border: 0;
			background: transparent;
			padding: 10px 12px;
			font-size: 14px;
			text-align: left;
			display: flex;
			align-items: center;
			justify-content: space-between;
			border-radius: 6px;
			cursor: pointer;
		}

		.menu-item:hover,
		.menu-item:focus {
			background: var(--menu-hover);
			outline: none;
		}

		.submenu-arrow {
			margin-left: 12px;
			font-size: 12px;
		}

		.demo-note {
			margin-top: 18px;
			font-size: 13px;
			color: #5f6368;
		}
	</style>
</head>
<body>
	<main>
		<div class="filter-toolbar" id="filterToolbar">
			<button class="filter-button" id="filterTools" aria-haspopup="true" aria-expanded="false">
				Tools
			</button>
			<div class="filter-menu" id="filterMenu" role="menu" hidden>
				<button class="menu-item" id="timeItem" role="menuitem" aria-haspopup="true" aria-expanded="false">
					<span id="timeLabel">Any time</span>
					<span class="submenu-arrow" aria-hidden="true">&gt;</span>
				</button>
				<button class="menu-item" role="menuitem" data-close="true">All results</button>
				<button class="menu-item" role="menuitem" data-close="true">Advanced Search</button>

				<div class="filter-submenu" id="submenuTime" role="menu" hidden>
					<button class="menu-item" role="menuitem" data-time="Any time">Any time</button>
					<button class="menu-item" role="menuitem" data-time="Past hour">Past hour</button>
					<button class="menu-item" role="menuitem" data-time="Past 24 hours">Past 24 hours</button>
					<button class="menu-item" role="menuitem" data-time="Past week">Past week</button>
					<button class="menu-item" role="menuitem" data-time="Past month">Past month</button>
					<button class="menu-item" role="menuitem" data-time="Past year">Past year</button>
					<button class="menu-item" role="menuitem" data-time="Custom range">Custom range</button>
				</div>
			</div>
		</div>

		<div class="demo-note">
			Click Tools to open the filter menu. Select a time range to update the label.
		</div>
	</main>

	<script>
		const toolbar = document.getElementById("filterToolbar");
		const toolsButton = document.getElementById("filterTools");
		const menu = document.getElementById("filterMenu");
		const timeItem = document.getElementById("timeItem");
		const timeLabel = document.getElementById("timeLabel");
		const timeSubmenu = document.getElementById("submenuTime");

		const openMenu = () => {
			menu.hidden = false;
			toolsButton.setAttribute("aria-expanded", "true");
		};

		const closeSubmenu = () => {
			timeSubmenu.hidden = true;
			timeItem.setAttribute("aria-expanded", "false");
		};

		const closeMenu = () => {
			menu.hidden = true;
			toolsButton.setAttribute("aria-expanded", "false");
			closeSubmenu();
		};

		const toggleMenu = () => {
			if (menu.hidden) {
				openMenu();
			} else {
				closeMenu();
			}
		};

		const toggleSubmenu = () => {
			if (timeSubmenu.hidden) {
				timeSubmenu.hidden = false;
				timeItem.setAttribute("aria-expanded", "true");
			} else {
				closeSubmenu();
			}
		};

		toolsButton.addEventListener("click", (event) => {
			event.stopPropagation();
			toggleMenu();
		});

		timeItem.addEventListener("click", (event) => {
			event.stopPropagation();
			toggleSubmenu();
		});

		menu.querySelectorAll("[data-close]").forEach((button) => {
			button.addEventListener("click", () => {
				closeMenu();
			});
		});

		timeSubmenu.querySelectorAll("[data-time]").forEach((button) => {
			button.addEventListener("click", () => {
				timeLabel.textContent = button.dataset.time;
				closeMenu();
			});
		});

		document.addEventListener("click", (event) => {
			if (!toolbar.contains(event.target)) {
				closeMenu();
			}
		});

		document.addEventListener("keydown", (event) => {
			if (event.key === "Escape") {
				closeMenu();
				toolsButton.focus();
			}
		});
	</script>
</body>
</html>
