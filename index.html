<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Wise Home</title>
    <style>
        :root {
            --bg-main: #f2fbf6;
            --bg-accent: #d4f4e3;
            --ink: #153327;
            --ink-soft: #2f5948;
            --btn: #1f6b47;
            --btn-hover: #195439;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 15% 15%, rgba(31, 107, 71, 0.16), transparent 40%),
                radial-gradient(circle at 80% 85%, rgba(21, 51, 39, 0.12), transparent 44%),
                linear-gradient(155deg, var(--bg-main), var(--bg-accent));
            padding: 20px;
        }

        .home-card {
            width: min(560px, 100%);
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 26px 60px -24px rgba(17, 51, 38, 0.35);
            padding: 44px 28px;
            text-align: center;
        }

        .home-title {
            margin: 0;
            font-size: clamp(1.9rem, 1.4rem + 2vw, 2.8rem);
            line-height: 1.1;
            letter-spacing: 0.02em;
        }

        .home-subtitle {
            margin: 14px 0 30px;
            font-size: 1rem;
            color: var(--ink-soft);
        }

        .enter-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 240px;
            padding: 14px 22px;
            border-radius: 999px;
            border: none;
            background: var(--btn);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 16px 34px -18px rgba(25, 84, 57, 0.75);
        }

        .enter-btn:hover {
            background: var(--btn-hover);
            transform: translateY(-1px);
        }

        .enter-btn:focus-visible {
            outline: 3px solid rgba(31, 107, 71, 0.28);
            outline-offset: 4px;
        }
    </style>
    
</head>
<body>
    <script >
        localStorage.removeItem('food_wise_date');
        localStorage.removeItem('food_wise_mood');
    </script>
    <main class="home-card">
        <h1 class="home-title">Food Wise System</h1>
        <p class="home-subtitle">Plan meals with what you already have in your kitchen.</p>
        <button class="enter-btn" type="button" onclick="window.location.href='home.html'">
            Enter Dashboard
        </button>
    </main>
</body>
</html>
