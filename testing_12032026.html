<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mood_Selector</title>
    <style>
        #panel {
            display: none;
        }
    </style>
    <style>
        .radio-toolbar {
            margin: 10px;
        }

        .radio-toolbar input[type="radio"] {
            opacity: 0;
            position: fixed;
            width: 0;
        }

        .radio-toolbar label {
        display: inline-flex;
        background-color: #ddd;
        padding: 10px 20px;
        font-family: sans-serif, Arial;
        font-size: 16px;
        border: 2px solid #444;
        border-radius: 4px;
        width: 90px;
        justify-content: center;
        }

        .radio-toolbar label:hover {
          background-color: #dfd;
        }

        .radio-toolbar input[type="radio"]:focus + label {
            border: 2px solid #444;
        }

        .radio-toolbar input[type="radio"]:checked + label {
            background-color: #bfb;
            border-color: #4c4;
        }

    </style>
</head>
<body>

    <div id="panel" class="radio-toolbar"> 
        <h1>Food Wise Kitchen System</h1>
        <p>-This system is use to suggest recipes depends on your refrigerator and your mood</p>
        <div id="AskMood"></div>
        <form id="Form">

                <input type="radio" id="radioAngry" name="mood" value="ease_angry">

                <input type="radio" id="radioAnxious" name="mood" value="ease_anxious">

                <input type="radio" id="radioExhausted" name="mood" value="energy_recover">

                <input type="radio" id="radioN/A"  name="mood" value="none">

                <button type="submit">Save</button>
                <button type="reset">Clear</button>
            </fieldset>
        </form>
    </div>
